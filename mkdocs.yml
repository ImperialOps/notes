site_name: Notes
site_url: https://imperialops.github.io/notes
nav:
  - Python: python.md
  - AWS: aws.md
  - System Design: systems.md
  - AI: ai.md
theme:
  name: material
markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
